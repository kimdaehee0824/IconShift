name: Release

on:
  push:
    tags:
      - '[0-9]*.[0-9]*.[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: Existing release tag, for example 1.0.0
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: macos-26
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

      - name: Validate release version
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must use the 1.0.0 format: $RELEASE_TAG" >&2
            exit 1
          fi

          git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG" >/dev/null

          PROJECT_VERSION="$(sed -n 's/.*"MARKETING_VERSION": "\([^"]*\)".*/\1/p' Project.swift)"
          INFO_VERSION="$(plutil -extract CFBundleShortVersionString raw Resources/Info.plist)"

          if [[ "$PROJECT_VERSION" != "$RELEASE_TAG" || "$INFO_VERSION" != "$RELEASE_TAG" ]]; then
            echo "Version mismatch: tag=$RELEASE_TAG Project.swift=$PROJECT_VERSION Info.plist=$INFO_VERSION" >&2
            exit 1
          fi

      # Replace ad-hoc signing with Developer ID signing and notarization here after configuring secrets.
      - name: Build release app
        env:
          ICONSHIFT_SIGN_ID: "-"
        run: scripts/build.sh release

      - name: Verify release app
        run: |
          set -euo pipefail
          APP="dist/IconShift.app"
          EXECUTABLE="$APP/Contents/MacOS/IconShift"

          test -x "$EXECUTABLE"
          test -s "$APP/Contents/Resources/ko.lproj/Localizable.strings"
          test -s "$APP/Contents/Resources/ja.lproj/Localizable.strings"
          test "$(plutil -extract CFBundleDevelopmentRegion raw "$APP/Contents/Info.plist")" = "en"
          test "$(plutil -extract CFBundleShortVersionString raw "$APP/Contents/Info.plist")" = "$RELEASE_TAG"

          ARCHS="$(lipo -archs "$EXECUTABLE")"
          [[ " $ARCHS " == *" arm64 "* ]]
          [[ " $ARCHS " == *" x86_64 "* ]]
          codesign --verify --strict --verbose=2 "$APP"

      - name: Create release archive
        run: ditto -c -k --keepParent dist/IconShift.app "IconShift-$RELEASE_TAG.zip"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ARCHIVE="IconShift-$RELEASE_TAG.zip"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ARCHIVE" --clobber
          else
            gh release create "$RELEASE_TAG" "$ARCHIVE" --generate-notes --verify-tag
          fi
